<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Autumn Sleeve</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --autumn-red: #8d2400;
            --autumn-orange: #e64a19;
            --autumn-bg: #fffbf0;
            --card-white: #ffffff;
            --sleeve-bg: #fdf2f0;
            --card-radius: 40px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: var(--autumn-bg); }

        .page-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100dvh;
            background-image: linear-gradient(rgba(255,251,240,0.85), rgba(255,251,240,0.85)), url('img/wedding-bg.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .slider-container { 
            width: 100%; height: 100dvh; overflow-y: scroll; overflow-x: hidden;
            scroll-snap-type: y mandatory; scroll-behavior: smooth; 
            scrollbar-width: none; position: relative; z-index: 10;
        }
        .slider-container::-webkit-scrollbar { display: none; }

        .slide { 
            width: 100%; height: 100dvh; 
            scroll-snap-align: start; scroll-snap-stop: always;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* KHUNG CHỨA CỐ ĐỊNH - DÙNG 3 TẦNG ĐỂ QUẢN LÝ Z-INDEX */
        .fixed-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100dvh;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
        }

        /* 1. BAO THIỆP DƯỚI (MẶT SAU) */
        .fixed-sleeve-back {
            position: relative;
            margin-top: -50px;
            width: 100%; max-width: 480px;
            height: 380px;
            background: #f0dad8;
            pointer-events: none;
            /* Tối ưu mobile */
            will-change: transform;
            backface-visibility: hidden;
            transform: translateZ(0);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        /* Tạo chóp tam giác ở đáy bao dưới */
        .fixed-sleeve-back::after {
            content: '';
            position: absolute;
            top: 100%; left: 0; width: 100%; height: 30px;
            background: inherit;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        /* 2. NHÂN THIỆP A */
        .fixed-card-a {
            position: relative; 
            transform: translateY(-100px); 
            width: 90%; max-width: 400px;
            height: 650px;
            background: var(--card-white);
            border-radius: var(--card-radius);
            border: 8px solid #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px 20px;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        .fixed-card-a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('img/wedding-bg.jpg');
            background-size: cover; background-position: center;
            border-radius: calc(var(--card-radius) - 8px);
            opacity: var(--card-bg-opacity, 0);
            z-index: 0;
        }

        /* 3. BAO THIỆP TRÊN (MẶT TRƯỚC) */
        .fixed-sleeve {
            position: relative;
            margin-top: -50px;
            width: 100%; max-width: 480px;
            height: 380px;
            background: var(--sleeve-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
            pointer-events: none;
        }

        .sleeve-info {
			width: 350px;
			height: auto;
			max-width: 400px;
            background: white; padding: 25px 40px;
            border: 1px dashed var(--autumn-orange);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: center; border-radius: 25px;
            pointer-events: auto;
        }

        .card-a-text {
            opacity: 0; width: 100%;
            position: relative;
            z-index: 1;
        }

        h1, h2 { font-family: 'Dancing Script', cursive; color: var(--autumn-red); }
        .romantic-title { font-family: 'Great Vibes', cursive; font-size: 2.8rem; margin: 30px 5px; line-height: 1.0; font-weight: normal; }
        .info-divider { width: 80px; height: 1px; background: var(--autumn-orange); margin: 25px auto; opacity: 0.2; }
        .details-text { font-size: 1rem; line-height: 1.8; color: #444; }

        /* Nhân thiệp B (Slide 3) */
        .card-b {
            position: relative;
            width: 90%; max-width: 400px;
            height: 650px;
            background: var(--card-white);
            border-radius: var(--card-radius);
            border: 8px solid #fff;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px 20px;
            margin: 0 auto;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: opacity 0.2s ease-out, transform 0.2s ease-out;
            z-index: 1;
        }

        .card-b::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('img/wedding-bg.jpg');
            background-size: cover; background-position: center;
            border-radius: calc(var(--card-radius) - 8px);
            z-index: -1;
        }

        #slide3.active .card-b {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; pointer-events: none; z-index: 150; overflow: hidden; }
        .leaf { position: absolute; top: -50px; }
        @keyframes leaf-fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110dvh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        .scroll-hint { 
            position: absolute; bottom: 25px; left: 0; width: 100%;
            text-align: center; font-size: 0.7rem; 
            color: var(--autumn-orange); text-transform: uppercase; 
            letter-spacing: 4px; animation: bounce 2s infinite; 
            z-index: 110; font-weight: 600;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .fixed-card-a.bouncing {
            animation: card-bounce 2s infinite;
        }
        @keyframes card-bounce { 
            0%, 100% { transform: translateY(-100px); } 
            50% { transform: translateY(-120px); } 
        }

        .qr-card-wrap {
            margin-top: 25px; padding: 10px; background: #fff; 
            border-radius: 20px; border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        @media (max-height: 700px) {
            .fixed-card-a, .card-b, .fixed-sleeve, .fixed-sleeve-back { scale: 0.9; }
        }
        @media (max-height: 620px) {
            .fixed-card-a, .card-b, .fixed-sleeve, .fixed-sleeve-back { scale: 0.8; }
        }
        @media (max-height: 550px) {
            .fixed-card-a, .card-b, .fixed-sleeve, .fixed-sleeve-back { scale: 0.7; }
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="leaf-container" id="leafContainer"></div>

    <!-- TẦNG 1: BAO DƯỚI -->
    <div class="fixed-container" style="z-index: 40;">
        <div class="fixed-sleeve-back" id="fixedSleeveBack"></div>
    </div>

    <!-- TẦNG 2: NHÂN THIỆP -->
    <div class="fixed-container" style="z-index: 50;">
        <div class="fixed-card-a bouncing" id="cardA">
            <div class="card-a-text" id="cardAText">
                <span id="cardATopText" style="font-size: 0.8rem; letter-spacing: 4px; color: #ccc; text-transform: uppercase;"></span>
                <h1 class="romantic-title" id="coupleNamesA"></h1>
                <div class="info-divider"></div>
                <div class="details-text">
                    <p id="eventTitle" style="color: var(--autumn-orange); font-weight: 600; letter-spacing: 1px;"></p>
                    <p id="eventTime" style="margin-top: 10px;"></p>
                    <p id="eventDate" style="font-size: 1.5rem; font-weight: 600; color: #333;"></p>
                    <div style="height: 30px;"></div>
                    <p id="locationTitle" style="color: var(--autumn-orange); font-weight: 600; letter-spacing: 1px;"></p>
                    <p id="locationName"></p>
                    <p id="locationAddress" style="font-size: 0.85rem; color: #888;"></p>
                </div>
                <div class="info-divider"></div>
                <img src="img/rings-icon.png" style="width: 50px; opacity: 0.5;" alt="rings">
            </div>
        </div>
    </div>

    <!-- TẦNG 3: BAO TRÊN -->
    <div class="fixed-container" style="z-index: 100;">
        <div class="fixed-sleeve" id="fixedSleeve">
            <div class="sleeve-info" id="sleeveInfo">
                <span id="invitationGreeting" style="font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #aaa;"></span>
                <h2 id="guestDisplay" style="font-size: 2rem; margin-top: 10px; color: var(--autumn-red);"></h2>
                <p id="sleeveHint" style="font-size: 0.6rem; color: #ccc; margin-top: 12px; letter-spacing: 1px;"></p>
            </div>
        </div>
    </div>

    <div class="slider-container" id="slider">
        <section class="slide" id="slide1">
            <div class="scroll-hint" id="scrollHint"></div>
        </section>
        <section class="slide" id="slide2"></section>
        <section class="slide" id="slide3">
            <div class="card-b">
                <h2 id="thankYouTitle" style="font-size: 2.8rem; margin-bottom: 20px;"></h2>
                <p id="thankYouMessage" style="font-size: 0.95rem; line-height: 1.8; color: #666; padding: 0 50px;"></p>
                <div id="qrContainer"></div>
            </div>
        </section>
    </div>

    <script>
        const CONFIG = {
            groomName: "Văn Mạnh",
            brideName: "Huyền Trang",
            eventTitle: "LỄ THÀNH HÔN",
            eventTime: "11:00 AM | Chủ nhật",
            eventDate: "20 . 12 . 2026",
            locationTitle: "ĐỊA ĐIỂM",
            locationName: "Trung tâm Hội nghị Tiệc cưới ABC",
            locationAddress: "123 Đường Láng, Đống Đa, Hà Nội",
            thankYouTitle: "Thank You!",
            thankYouMessage: "Sự hiện diện của bạn là niềm vinh hạnh lớn nhất đối với gia đình chúng mình.",
            defaultGuest: "Bạn và Gia Đình",
            invitationGreeting: "Thân mời",
            sleeveHint: "VUỐT LÊN ĐỂ RÚT THIỆP",
            cardATopText: "Wedding Invitation",
            scrollHint: "RÚT THIỆP ↑",
            qrText: "MỪNG CƯỚI ONLINE",
            leafImages: [
                'img/maple_leaf/leaf_1.png',
                'img/maple_leaf/leaf_2.png',
                'img/maple_leaf/leaf_3.png'
            ]
        };

        function applyConfig() {
            const setSafeText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            };
            const setSafeHTML = (id, html) => {
                const el = document.getElementById(id);
                if (el) el.innerHTML = html;
            };
            setSafeHTML('coupleNamesA', `${CONFIG.groomName}<br><span style="font-size: 1.2rem; display: inline-block; margin: 0px 0;">&</span><br>${CONFIG.brideName}`);
            setSafeText('eventTitle', CONFIG.eventTitle);
            setSafeText('eventTime', CONFIG.eventTime);
            setSafeText('eventDate', CONFIG.eventDate);
            setSafeText('locationTitle', CONFIG.locationTitle);
            setSafeText('locationName', CONFIG.locationName);
            setSafeText('locationAddress', CONFIG.locationAddress);
            setSafeText('thankYouTitle', CONFIG.thankYouTitle);
            setSafeText('thankYouMessage', CONFIG.thankYouMessage);
            setSafeText('invitationGreeting', CONFIG.invitationGreeting);
            setSafeText('sleeveHint', CONFIG.sleeveHint);
            setSafeText('cardATopText', CONFIG.cardATopText);
            setSafeText('scrollHint', CONFIG.scrollHint);
        }

        const state = { guest: CONFIG.defaultGuest, showQr: false };

        function initParams() {
            applyConfig();
            const urlParams = new URLSearchParams(window.location.search);
            const getParam = (name) => {
                const val = urlParams.get(name);
                if (!val) return null;
                try { return decodeURIComponent(val); } catch (e) { return val; }
            };
            let guest = getParam('to');
            let showQr = getParam('qr');
            const payload = urlParams.get('p');
            if (payload) {
                try {
                    const decodedData = decodeURIComponent(escape(window.atob(payload)));
                    const params = new URLSearchParams(decodedData);
                    if (params.get('to')) guest = params.get('to');
                    if (params.get('qr')) showQr = params.get('qr');
                } catch (e) { console.error("Payload error"); }
            }
            if (guest) state.guest = guest;
            document.getElementById('guestDisplay').textContent = state.guest;
            state.showQr = (showQr === 'true');
            const qrContainer = document.getElementById('qrContainer');
            if (state.showQr) {
                qrContainer.innerHTML = `
                    <div class="qr-card-wrap">
                        <img src="img/qr.jpg" style="width: 140px; height: 140px; border-radius: 12px;" alt="QR">
                        <p style="font-size: 0.7rem; color: #bbb; margin-top: 8px;">${CONFIG.qrText}</p>
                    </div>
                `;
            } else {
                qrContainer.innerHTML = `<div style="font-size: 4rem; opacity: 0.1; margin: 30px 0;">💍</div>`;
            }
        }

        let leafInterval = null;
        function spawnLeaf() {
            const container = document.getElementById('leafContainer');
            if (!container) return;
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            const randomLeaf = CONFIG.leafImages[Math.floor(Math.random() * CONFIG.leafImages.length)];
            leaf.innerHTML = `<img src="${randomLeaf}" style="width: 100%; height: 100%; object-fit: contain;">`;
            leaf.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 30 + 20);
            leaf.style.width = size + 'px';
            leaf.style.height = size + 'px';
            leaf.style.transform = `rotate(${Math.random() * 360}deg)`;
            const duration = Math.random() * 3 + 5;
            leaf.style.animation = `leaf-fall ${duration}s linear forwards`;
            container.appendChild(leaf);
            setTimeout(() => { if (leaf.parentNode) leaf.remove(); }, duration * 1000);
        }

        function manageLeaves(scrollTop, vh) {
            if (scrollTop > vh * 0.1) {
                if (!leafInterval) {
                    for (let i = 0; i < 5; i++) setTimeout(spawnLeaf, Math.random() * 500);
                    leafInterval = setInterval(spawnLeaf, 300);
                }
            } else {
                if (leafInterval) { clearInterval(leafInterval); leafInterval = null; }
            }
        }

        const slider = document.getElementById('slider');
        const sleeve = document.getElementById('fixedSleeve');
        const sleeveBack = document.getElementById('fixedSleeveBack');
        const sleeveInfo = document.getElementById('sleeveInfo');
        const cardA = document.getElementById('cardA');
        const cardAText = document.getElementById('cardAText');
        const scrollHint = document.getElementById('scrollHint');
        const slides = document.querySelectorAll('.slide');

        slider.addEventListener('scroll', () => {
            const scrollTop = slider.scrollTop;
            const vh = window.innerHeight;
            const index = Math.round(scrollTop / vh);

            if (scrollTop === 0) cardA.classList.add('bouncing');
            else cardA.classList.remove('bouncing');

            // 1. Hiệu ứng mờ dần hint và info
            if (scrollTop <= vh) {
                scrollHint.style.opacity = Math.max(0, 1 - (scrollTop / (vh * 0.1)));
                sleeveInfo.style.opacity = Math.max(0, 1 - (scrollTop / (vh * 0.4)));
            } else {
                scrollHint.style.opacity = 0;
                sleeveInfo.style.opacity = 0;
            }

            slides.forEach((s, i) => {
                if (i === index) s.classList.add('active');
                else s.classList.remove('active');
            });

            // 2. Logic trượt và Fade nội dung thiệp
            if (scrollTop <= vh) {
                const ratio = scrollTop / vh;
                const offset = -scrollTop;
                
                // Trượt đồng bộ 2 lớp bao
                sleeve.style.transform = `translateY(${offset}px)`;
                sleeveBack.style.transform = `translateY(${offset}px)`;

                // HIỆN LẠI BAO THIỆP KHI QUAY VỀ SLIDE 1
                const sleeveFade = Math.min(1, Math.max(0, (1 - ratio) / 0.3));
                sleeve.style.opacity = sleeveFade;
                sleeveBack.style.opacity = sleeveFade;
                
                // Trượt nhân thiệp
                const currentOffset = -100 * (1 - ratio);
                cardA.style.transform = `translateY(${currentOffset}px)`;
                
                // Fade nội dung thiệp (0.3 - 0.7)
                const cardFade = Math.min(1, Math.max(0, (ratio - 0.3) / 0.4));
                cardAText.style.opacity = cardFade;
                cardA.style.setProperty('--card-bg-opacity', cardFade);
                cardA.style.opacity = 1;
            } else {
                const overScroll = scrollTop - vh;
                cardA.style.transform = `translateY(${-overScroll}px)`;
                if (index >= 2) cardA.style.opacity = 0;
                else cardA.style.opacity = 1;
                
                // Bao thiệp ẩn hoàn toàn khi qua Slide 1
                sleeve.style.opacity = 0;
                sleeveBack.style.opacity = 0;
                
                cardAText.style.opacity = 1;
                cardA.style.setProperty('--card-bg-opacity', 1);
            }
            manageLeaves(scrollTop, vh);
        });

        window.onload = initParams;
    </script>
</body>
</html>
