<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation - Autumn Sleeve v15</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --autumn-red: #8d2400;
            --autumn-orange: #e64a19;
            --autumn-bg: #fffbf0;
            --card-white: #ffffff;
            --sleeve-bg: #fdf2f0;
            --card-radius: 40px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body, html { width: 100%; height: 100%; overflow: hidden; font-family: 'Montserrat', sans-serif; background-color: var(--autumn-bg); }

        .page-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,251,240,0.85), rgba(255,251,240,0.85)), url('../img/wedding-bg.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .slider-container { 
            width: 100%; height: 100dvh; overflow-y: scroll; overflow-x: hidden;
            scroll-snap-type: y mandatory; scroll-behavior: smooth; 
            scrollbar-width: none; position: relative; z-index: 10;
        }
        .slider-container::-webkit-scrollbar { display: none; }

        .slide { 
            width: 100%; height: 100dvh; 
            scroll-snap-align: start; scroll-snap-stop: always;
            display: flex; justify-content: center; align-items: center;
            position: relative;
        }

        /* NHÂN THIỆP A - FIXED 
           Bắt đầu ở top: 25vh (Nằm trong bao ở Slide 1)
        */
        .fixed-card-a {
            position: fixed;
            top: 25vh; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 400px;
            height: 92dvh;
            background: var(--card-white);
            border-radius: var(--card-radius);
            border: 8px solid #fff;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            z-index: 50;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px 20px;
            pointer-events: none;
            /* Transition opacity, không transition transform vì JS sẽ lo */
            transition: opacity 0.2s ease-in-out;
        }

        .fixed-card-a::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('img/wedding-bg.jpg');
            background-size: cover; background-position: center;
            border-radius: calc(var(--card-radius) - 8px);
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            z-index: -1;
        }

        .fixed-card-a.show-bg::before {
            opacity: 1;
        }

        /* BAO THIỆP - FIXED 
           Cũng bắt đầu ở top: 25vh (Khớp với nhân thiệp A)
        */
        .fixed-sleeve {
            position: fixed;
            top: 25vh; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; max-width: 460px;
            height: 42vh;
            background: var(--sleeve-bg);
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            pointer-events: none;
        }

        .sleeve-info {
            background: white; padding: 25px 40px;
            border: 1px dashed var(--autumn-orange);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            text-align: center; border-radius: 25px;
            pointer-events: auto;
        }

        /* Nội dung chữ trên nhân A */
        .card-a-text {
            opacity: 0;
            width: 100%;
            /* Ẩn/hiện chữ qua class với thời gian 0.2s cố định */
            transition: opacity 0.2s ease-in-out;
        }
        .card-a-text.show-text {
            opacity: 1;
        }

        h1, h2 { font-family: 'Dancing Script', cursive; color: var(--autumn-red); }
        .romantic-title { font-size: 3.4rem; margin: 15px 0; line-height: 1.2; }
        .info-divider { width: 80px; height: 1px; background: var(--autumn-orange); margin: 45px auto; opacity: 0.2; }
        .details-text { font-size: 1rem; line-height: 1.8; color: #444; }

        /* Nhân thiệp B (Slide 3) */
        .card-b {
            width: 90%; max-width: 400px;
            height: 92dvh; min-height: 480px;
            background: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('img/wedding-bg.jpg');
            background-size: cover; background-position: center;
            border-radius: var(--card-radius);
            border: 8px solid #fff;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px 20px;
            margin: 0 auto;
            opacity: 0;
            transform: scale(0.95) translateY(20px);
            transition: opacity 0.2s ease-out, transform 0.2s ease-out;
        }

        #slide3.active .card-b {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* Lá phong rơi */
        .leaf-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 150; overflow: hidden; }
        .leaf { position: absolute; top: -50px; }
        @keyframes leaf-fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(110vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        .scroll-hint { 
            position: absolute; bottom: 25px; left: 0; width: 100%;
            text-align: center; font-size: 0.7rem; 
            color: var(--autumn-orange); text-transform: uppercase; 
            letter-spacing: 4px; animation: bounce 2s infinite; 
            z-index: 110; font-weight: 600;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .fixed-card-a.bouncing {
            animation: card-bounce 2s infinite;
        }
        @keyframes card-bounce { 
            0%, 100% { transform: translate(-50%, -50%); } 
            50% { transform: translate(-50%, calc(-50% - 20px)); } 
        }

        .qr-card-wrap {
            margin-top: 25px; padding: 10px; background: #fff; 
            border-radius: 20px; border: 1px solid #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* KHI MÀN HÌNH QUÁ NGẮN (Chiều cao < 650px) -> Thu nhỏ nội dung */
        @media (max-height: 650px) {
            /* Thu nhỏ padding chung */
            .fixed-card-a, .card-b {
                padding: 20px 15px; 
            }
            
            /* Thu nhỏ tên Cô Dâu Chú Rể */
            .romantic-title { font-size: 3.0rem; margin: 10px 0; }
            
            /* Giảm margin của các dải phân cách */
            .info-divider { margin: 15px auto; }
            
            /* Thu nhỏ chữ nội dung */
            .details-text { font-size: 0.85rem; line-height: 1.5; }
            .details-text p { margin-top: 5px !important; }
            .details-text p:nth-child(3) { font-size: 1.2rem !important; } /* Ngày tháng */
            
            /* Giảm khoảng trống giữa các phần */
            .details-text div[style*="height"] { height: 15px !important; }
            
            /* Thu nhỏ logo nhẫn */
            .fixed-card-a img[alt="rings"] { width: 35px !important; }

            /* Slide 3 (Thank you) */
            .card-b h2 { font-size: 2.5rem !important; margin-bottom: 10px !important; }
            .card-b p { font-size: 0.85rem !important; }
            .card-b p:last-child { font-size: 1.8rem !important; margin-top: 25px !important; }
            .qr-card-wrap { margin-top: 15px; padding: 5px; }
            .qr-card-wrap img { width: 100px !important; height: 100px !important; }
        }

        /* Thậm chí nhỏ hơn nữa ( < 550px) - ví dụ iPhone 5/SE */
        @media (max-height: 550px) {
            .romantic-title { font-size: 2.4rem; }
            .details-text { font-size: 0.75rem; }
            .info-divider { margin: 10px auto; }
        }

    </style>
</head>
<body>
    <div class="page-bg"></div>
    <div class="leaf-container" id="leafContainer"></div>

    <div class="fixed-sleeve" id="fixedSleeve">
        <div class="sleeve-info">
            <span id="invitationGreeting" style="font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #aaa;"></span>
            <h2 id="guestDisplay" style="font-size: 2rem; margin-top: 10px; color: var(--autumn-red);"></h2>
            <p id="sleeveHint" style="font-size: 0.6rem; color: #ccc; margin-top: 12px; letter-spacing: 1px;"></p>
        </div>
    </div>

    <div class="fixed-card-a bouncing" id="cardA">
        <div class="card-a-text" id="cardAText">
            <span id="cardATopText" style="font-size: 0.8rem; letter-spacing: 4px; color: #ccc; text-transform: uppercase;"></span>
            <h1 class="romantic-title" id="coupleNamesA"></h1>
            <div class="info-divider"></div>
            <div class="details-text">
                <p id="eventTitle" style="color: var(--autumn-orange); font-weight: 600; letter-spacing: 1px;"></p>
                <p id="eventTime" style="margin-top: 10px;"></p>
                <p id="eventDate" style="font-size: 1.5rem; font-weight: 600; color: #333;"></p>
                <div style="height: 30px;"></div>
                <p id="locationTitle" style="color: var(--autumn-orange); font-weight: 600; letter-spacing: 1px;"></p>
                <p id="locationName"></p>
                <p id="locationAddress" style="font-size: 0.85rem; color: #888;"></p>
            </div>
            <div class="info-divider"></div>
            <img src="img/rings-icon.png" style="width: 50px; opacity: 0.5;" alt="rings">
        </div>
    </div>

    <div class="slider-container" id="slider">
        <section class="slide" id="slide1">
            <div class="scroll-hint" id="scrollHint"></div>
        </section>
        <section class="slide" id="slide2"></section>
        <section class="slide" id="slide3">
            <div class="card-b">
                <h2 id="thankYouTitle" style="font-size: 3.2rem; margin-bottom: 20px;"></h2>
                <p id="thankYouMessage" style="font-size: 0.95rem; line-height: 1.8; color: #666; padding: 0 10px;"></p>
                <div id="qrContainer"></div>
                <p id="coupleNamesB" style="margin-top: 45px; font-family: 'Dancing Script', cursive; color: var(--autumn-red); font-size: 2.2rem;"></p>
            </div>
        </section>
    </div>

    <script>
        // ==========================================
        // CẤU HÌNH THÔNG TIN THIỆP CƯỚI
        // Thay đổi các thông tin tại đây
        // ==========================================
        const CONFIG = {
            groomName: "Văn Mạnh",
            brideName: "Huyền Trang",
            eventTitle: "LỄ THÀNH HÔN",
            eventTime: "11:00 AM | Chủ nhật",
            eventDate: "20 . 12 . 2026",
            locationTitle: "ĐỊA ĐIỂM",
            locationName: "Trung tâm Hội nghị Tiệc cưới ABC",
            locationAddress: "123 Đường Láng, Đống Đa, Hà Nội",
            thankYouTitle: "Thank You!",
            thankYouMessage: "Sự hiện diện của bạn là niềm vinh hạnh lớn nhất đối với gia đình chúng mình.",
            
            // Các text phụ trên thiệp
            defaultGuest: "Bạn và Gia Đình",
            invitationGreeting: "Thân mời",
            sleeveHint: "VUỐT LÊN ĐỂ RÚT THIỆP",
            cardATopText: "Wedding Invitation",
            scrollHint: "RÚT THIỆP ↓",
            qrText: "MỪNG CƯỚI ONLINE"
        };

        function applyConfig() {
            document.getElementById('coupleNamesA').innerHTML = `${CONFIG.groomName}<br><span style="font-size: 1.6rem; display: inline-block; margin: 5px 0;">&</span><br>${CONFIG.brideName}`;
            document.getElementById('eventTitle').textContent = CONFIG.eventTitle;
            document.getElementById('eventTime').textContent = CONFIG.eventTime;
            document.getElementById('eventDate').textContent = CONFIG.eventDate;
            document.getElementById('locationTitle').textContent = CONFIG.locationTitle;
            document.getElementById('locationName').textContent = CONFIG.locationName;
            document.getElementById('locationAddress').textContent = CONFIG.locationAddress;
            document.getElementById('thankYouTitle').textContent = CONFIG.thankYouTitle;
            document.getElementById('thankYouMessage').textContent = CONFIG.thankYouMessage;
            document.getElementById('coupleNamesB').textContent = `${CONFIG.groomName} & ${CONFIG.brideName}`;
            
            document.getElementById('invitationGreeting').textContent = CONFIG.invitationGreeting;
            document.getElementById('sleeveHint').textContent = CONFIG.sleeveHint;
            document.getElementById('cardATopText').textContent = CONFIG.cardATopText;
            document.getElementById('scrollHint').textContent = CONFIG.scrollHint;
        }

        const state = { guest: CONFIG.defaultGuest, showQr: false };

        function initParams() {
            applyConfig();
            const urlParams = new URLSearchParams(window.location.search);
            const getParam = (name) => {
                const val = urlParams.get(name);
                if (!val) return null;
                try { return decodeURIComponent(val); } catch (e) { return val; }
            };

            let guest = getParam('to');
            let showQr = getParam('qr');
            const payload = urlParams.get('p');

            if (payload) {
                try {
                    const decodedData = decodeURIComponent(escape(window.atob(payload)));
                    const params = new URLSearchParams(decodedData);
                    if (params.get('to')) guest = params.get('to');
                    if (params.get('qr')) showQr = params.get('qr');
                } catch (e) { console.error("Payload error"); }
            }

            if (guest) {
                state.guest = guest;
            }
            document.getElementById('guestDisplay').textContent = state.guest;

            state.showQr = (showQr === 'true');
            
            const qrContainer = document.getElementById('qrContainer');
            if (state.showQr) {
                qrContainer.innerHTML = `
                    <div class="qr-card-wrap">
                        <img src="../img/qr.jpg" style="width: 140px; height: 140px; border-radius: 12px;" alt="QR">
                        <p style="font-size: 0.7rem; color: #bbb; margin-top: 8px;">${CONFIG.qrText}</p>
                    </div>
                `;
            } else {
                qrContainer.innerHTML = `<div style="font-size: 4rem; opacity: 0.1; margin: 30px 0;">💍</div>`;
            }
        }

        let leafInterval = null;

        function spawnLeaf() {
            const container = document.getElementById('leafContainer');
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.innerHTML = `<svg viewBox="0 0 512 512" fill="currentColor" width="100%" height="100%"><path d="M495.9 281.7l-47.5-17.6c-4.4-1.6-9.5-.1-12.2 3.8l-15.1 22.1c-2.4 3.5-6.8 4.7-10.5 2.6L324.4 240c-1.8-.9-3.9-1-5.8-.3l-48 17.8c-4.4 1.6-9.5.1-12.2-3.8l-37.3-54.6c-2.4-3.5-2.2-8.3.4-11.5l146.6-180.2c2.9-3.6 2.6-8.8-.7-12L348.1 4.3c-2.5-2.4-6.3-2.9-9.3-1.2L167.3 103.5c-3.1 1.7-6.9 1.4-9.7-.9l-19.1-15.7c-3.1-2.6-7.7-2.4-10.6.4L5.3 216c-3 3-3.1 7.8-.3 10.9l19.1 21.2c2.6 2.9 3 7.1.9 10.4L1.7 311c-2 3.2-1.7 7.4.8 10.3l37.3 43.1c2.4 2.8 6.5 3.5 9.7 1.8l20.4-11c3.2-1.7 7.2-1.2 9.9 1.3l17.7 16.3c2.7 2.5 6.9 2.5 9.6 0l17.7-16.3c2.7-2.5 6.7-3 9.9-1.3l20.4 11c3.2 1.7 7.3 1 9.7-1.8l37.3-43.1c2.5-2.9 2.8-7.1.8-10.3l-23.3-52.5c-2.1-3.3-1.7-7.5.9-10.4l19.1-21.2c2.8-3.1 2.7-7.9-.3-10.9l-122.6-128.8c-2.9-3.1-2.9-7.9 0-11l146.6 180.2c2.6 3.2 2.8 8 .4 11.5l-37.3 54.6c-2.7 3.9-7.8 5.4-12.2 3.8l-48-17.8c-1.9-.7-4-.6-5.8.3L32.4 345c-3.7 2.1-8.1.9-10.5-2.6l-15.1-22.1c-2.7-3.9-7.8-5.4-12.2-3.8l-47.5 17.6c-4.4 1.6-6.2 6.8-4 10.8l56.5 104.1c2.2 4.1 7.4 5.3 11.2 2.6l24.4-17.5c3.2-2.3 7.6-1.8 10.2 1.1l111 123.4c2.6 2.9 7.1 2.9 9.7 0l111-123.4c2.6-2.9 7-3.4 10.2-1.1l24.4 17.5c3.8 2.7 9 1.5 11.2-2.6l56.5-104.1c2.2-4 0-9.2-4.4-10.8z"/></svg>`;
            leaf.style.left = Math.random() * 100 + '%';
            const size = (Math.random() * 35 + 20);
            leaf.style.width = size + 'px';
            leaf.style.color = ['#e64a19', '#bf360c', '#ff6f00', '#d84315'][Math.floor(Math.random() * 4)];
            const duration = Math.random() * 4 + 6;
            leaf.style.animation = `leaf-fall ${duration}s linear forwards`;
            container.appendChild(leaf);

            // Tự động xoá lá khỏi DOM sau khi rơi xong
            setTimeout(() => {
                if (leaf.parentNode) leaf.remove();
            }, duration * 1000);
        }

        function manageLeaves(scrollTop, vh) {
            // Khi bắt đầu kéo thiệp xuống (vượt qua 10% màn hình), bắt đầu spawn lá
            if (scrollTop > vh * 0.1) {
                if (!leafInterval) {
                    // Spawn mồi 5 lá ngay lập tức
                    for (let i = 0; i < 5; i++) {
                        setTimeout(spawnLeaf, Math.random() * 500);
                    }
                    // Liên tục spawn lá mới mỗi 300ms
                    leafInterval = setInterval(spawnLeaf, 300);
                }
            } else {
                // Đóng thiệp (kéo ngược về đầu Slide 1), NGƯNG spawn lá mới
                if (leafInterval) {
                    clearInterval(leafInterval);
                    leafInterval = null;
                }
            }
        }

        const slider = document.getElementById('slider');
        const sleeve = document.getElementById('fixedSleeve');
        const cardA = document.getElementById('cardA');
        const cardAText = document.getElementById('cardAText');
        const slides = document.querySelectorAll('.slide');

        slider.addEventListener('scroll', () => {
            const scrollTop = slider.scrollTop;
            const vh = window.innerHeight;
            const index = Math.round(scrollTop / vh);

            // Bật/tắt hiệu ứng bouncing nhấp nhô
            if (scrollTop === 0) {
                cardA.classList.add('bouncing');
            } else {
                cardA.classList.remove('bouncing');
            }

            slides.forEach((s, i) => {
                if (i === index) s.classList.add('active');
                else s.classList.remove('active');
            });

            if (scrollTop <= vh) {
                // TỪ SLIDE 1 ĐẾN SLIDE 2

                // Bao thiệp trượt LÊN theo hướng cuộn để cảm giác gắn với Slide 1
                sleeve.style.transform = `translate(-50%, calc(-50% - ${scrollTop}px))`;

                // Nhân thiệp A trượt XUỐNG dứt khoát
                // Bắt đầu từ top: 25vh ở Slide 1 -> top: 50vh ở Slide 2
                const ratio = scrollTop / vh;
                const cardY = 25 + (ratio * 25); // Tính theo % vh
                cardA.style.top = `${cardY}vh`;
                cardA.style.transform = `translate(-50%, -50%)`;
                
                // Mở/đóng chữ thông qua class với css opacity delay. 
                // Thay vì ẩn ở 10% như cũ, ta đẩy ngưỡng ẩn lên cao hơn (ví dụ 60%) để khi kéo về 1 chữ sẽ bắt đầu ẩn ngay
                if (ratio > 0.6) {
                    cardAText.classList.add('show-text');
                    cardA.classList.add('show-bg');
                } else {
                    cardAText.classList.remove('show-text');
                    cardA.classList.remove('show-bg');
                }
                
                // Đảm bảo Card A luôn hiện khi vuốt giữa 1 và 2
                cardA.style.opacity = 1;

            } else {
                // TỪ SLIDE 2 ĐẾN SLIDE 3
                const overScroll = scrollTop - vh;
                
                // Cố định top là 50vh, dùng transform translateY để nhân A trượt lên cùng Slide 3
                cardA.style.top = `50vh`;
                cardA.style.transform = `translate(-50%, calc(-50% - ${overScroll}px))`;
                
                // Khi qua Slide 3, mờ nhân A đi
                if (index >= 2) {
                    cardA.style.opacity = 0;
                } else {
                    cardA.style.opacity = 1;
                }
                // Giữ text hiện để không bị chớp khi vuốt từ 3 về 2
                cardAText.classList.add('show-text');
                cardA.classList.add('show-bg');
            }

            manageLeaves(scrollTop, vh);
        });

        window.onload = initParams;
    </script>
</body>
</html>
